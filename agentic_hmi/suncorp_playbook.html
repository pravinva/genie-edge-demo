ox exit\\\x22 style\x3d\\\x22margin-top:20px;\\\x22\x3e\x3cdiv class\x3d\\\x22criteria-box-label\\\x22\x3eExit Criteria\x3c\\\/div\x3e\x3cdiv class\x3d\\\x22criteria-box-content\\\x22\x3e\x3cul\x3e\x3cli\x3eMonitoring dashboards deployed for warehouse performance and adoption metrics\x3c\\\/li\x3e\x3cli\x3eAlerting workflows configured and tested\x3c\\\/li\x3e\x3cli\x3eInternal onboarding documentation published\x3c\\\/li\x3e\x3cli\x3eKickoff communications sent to all target business units\x3c\\\/li\x3e\x3cli\x3eEnablement sessions delivered (or scheduled) for each business unit\x3c\\\/li\x3e\x3cli\x3eOffice hours cadence established with dedicated channel\x3c\\\/li\x3e\x3cli\x3eFeedback collection mechanism in place\x3c\\\/li\x3e\x3cli\x3eAdoption KPIs baselined with first-week data\x3c\\\/li\x3e\x3c\\\/ul\x3e\x3c\\\/div\x3e\x3c\\\/div\x3e\\n\x3c\\\/div\x3e\\n\\n\\n\x3cdiv class\x3d\\\x22phase-panel\\\x22 id\x3d\\\x22panel-6\\\x22\x3e\\n  \x3cdiv class\x3d\\\x22phase-header\\\x22\x3e\\n    \x3cdiv class\x3d\\\x22phase-title-block\\\x22\x3e\\n      \x3cdiv class\x3d\\\x22phase-label\\\x22\x3eReference · DevOps\x3c\\\/div\x3e\\n      \x3cdiv class\x3d\\\x22phase-title\\\x22\x3eGenie Space DevOps Practices\x3c\\\/div\x3e\\n      \x3cdiv class\x3d\\\x22phase-subtitle\\\x22\x3eManage Genie Spaces as code. These practices ensure reproducibility, auditability, and safe promotion across dev, stage, and production environments.\x3c\\\/div\x3e\\n    \x3c\\\/div\x3e\\n    \x3cdiv class\x3d\\\x22phase-stats\\\x22\x3e\\n      \x3cdiv class\x3d\\\x22phase-progress-ring-wrap\\\x22\x3e\\n        \x3csvg viewBox\x3d\\\x220 0 72 72\\\x22\x3e\x3ccircle class\x3d\\\x22ring-bg\\\x22 cx\x3d\\\x2236\\\x22 cy\x3d\\\x2236\\\x22 r\x3d\\\x2230\\\x22\/\x3e\x3ccircle class\x3d\\\x22ring-fill\\\x22 id\x3d\\\x22ring-6\\\x22 cx\x3d\\\x2236\\\x22 cy\x3d\\\x2236\\\x22 r\x3d\\\x2230\\\x22\/\x3e\x3c\\\/svg\x3e\\n        \x3cdiv class\x3d\\\x22ring-pct\\\x22 id\x3d\\\x22ringpct-6\\\x22\x3e0%\x3c\\\/d x3d\\\x22round\\\x22\/\x3e\x3c\\\/svg\x3e\x3c\\\/div\x3e\x3cdiv class\x3d\\\x22task-text\\\x22\x3eExport serialized_space via Get Space API and commit to Git as source of truth\x3cdiv class\x3d\\\x22task-detail\\\x22\x3eUse include_serialized_space\x3dtrue. Store alongside instructions, example SQL, functions, and benchmarks. Enables version history, code review, and branching \\u2014 just like application code.\x3c\\\/div\x3e\x3c\\\/div\x3e\x3c\\\/div\x3e\\n      \x3cdiv class\x3d\\\x22task-item\\\x22 onclick\x3d\\\x22toggleTask(this)\\\x22\x3e\x3cdiv class\x3d\\\x22task-checkbox\\\x22\x3e\x3csvg class\x3d\\\x22task-checkbox-inner\\\x22 width\x3d\\\x2210\\\x22 height\x3d\\\x2210\\\x22 viewBox\x3d\\\x220 0 10 10\\\x22 fill\x3d\\\x22none\\\x22\x3e\x3cpath d\x3d\\\x22M1.5 5L4 7.5L8.5 2.5\\\x22 stroke\x3d\\\x22white\\\x22 stroke-width\x3d\\\x221.8\\\x22 stroke-linecap\x3d\\\x22round\\\x22 stroke-linejoin\x3d\\\x22round\\\x22\/\x3e\x3c\\\/svg\x3e\x3c\\\/div\x3e\x3cdiv class\x3d\\\x22task-text\\\x22\x3eIntegrate with Databricks Asset Bundles (DABs) for structured configuration management\x3cdiv class\x3d\\\x22task-detail\\\x22\x3eDABs provide a standardised way to package and deploy Genie Space configurations alongside other Databricks assets.\x3c\\\/div\x3e\x3c\\\/div\x3e\x3c\\\/div\x3e\\n    \x3c\\\/div\x3e\x3c\\\/div\x3e\\n  \x3c\\\/div\x3e\\n\\n  \x3cdiv class\x3d\\\x22milestone-group\\\x22 data-phase\x3d\\\x226\\\x22\x3e\\n    \x3cdiv class\x3d\\\x22milestone-header\\\x22 onclick\x3d\\\x22toggleMilestone(this)\\\x22\x3e\x3cspan class\x3d\\\x22milestone-id\\\x22\x3eDevOps.2\x3c\\\/span\x3e\x3cspan class\x3d\\\x22milestone-name\\\x22\x3eEnforce Schema Validation in CI\x3c\\\/span\x3e\x3cdiv class\x3d\\\x22milestone-progress-mini\\\x22\x3e\x3cdiv class\x3d\\\x22milestone-progress-fill\\\x22\x3e\x3c\\\/div\x3e\x3c\\\/div\x3e\x3csvg class\x3d\\\x22milestone-chevron\\\x22 viewBox\x3d\\\x220 0 24 24\\\x22 fill\x3d\\\x22none\\\x22 stroke\x3d\\\x22currentColor\\\x22 stroke-width\x3d\\\x222\\\x22\x3e\x3cpath d\x3d\\\x22M6 9l6 6 6-6\\\x22\/\x3e\x3c\\\/svg\x3e\x3c\\\/div\x3e\\n    \x3cdiv class\x3d\\\x22milestone-body\\\x22\x3e\x3cdiv class\x3d\\\x22milestone-description\\\x22\x3eValidate serialized_space on every commit: version field present, ID format (32-char lowercase hex), sorted arrays, uniqueness constraints, size limits. Fail CI if validation rules are not met \\u2014 prevents bad deployments before they reach any environment.\x3c\\\/div\x3e\\n    \x3cdiv class\x3d\\\x22task-list\\\x22\x3e\\n      \x3cdiv class\x3d\\\x22task-item\\\x22 onclick\x3d\\\x22toggleTask(this)\\\x22\x3e\x3cdiv class\x3d\\\x22task-checkbox\\\x22\x3e\x3csvg class\x3d\\\x22task-checkbox-inner\\\x22 width\x3d\\\x2210\\\x22 height\x3d\\\x2210\\\x22 viewBox\x3d\\\x220 0 10 10\\\x22 fill\x3d\\\x22none\\\x22\x3e\x3cpath d\x3d\\\x22M1.5 5L4 7.5L8.5 2.5\\\x22 stroke\x3d\\\x22white\\\x22 stroke-width\x3d\\\x221.8\\\x22 stroke-linecap\x3d\\\x22round\\\x22 stroke-linejoin\x3d\\\x22round\\\x22\/\x3e\x3c\\\/svg\x3e\x3c\\\/div\x3e\x3cdiv class\x3d\\\x22task-text\\\x22\x3eImplement automated schema validation step in CI pipeline\x3cdiv class\x3d\\\x22task-detail\\\x22\x3eValidate: version field present, 32-char lowercase hex IDs, sorted arrays, uniqueness constraints, size limits. CI must fail if any validation rule is not met.\x3c\\\/div\x3e\x3c\\\/div\x3e\x3c\\\/div\x3e\\n    \x3c\\\/div\x3e\x3c\\\/div\x3e\\n  \x3c\\\/div\x3e\\n\\n  \x3cdiv class\x3d\\\x22milestone-group\\\x22 data-phase\x3d\\\x226\\\x22\x3e\\n    \x3cdiv class\x3d\\\x22milestone-header\\\x22 onclick\x3d\\\x22toggleMilestone(this)\\\x22\x3e\x3cspan class\x3d\\\x22milestone-id\\\x22\x3eDevOps.3\x3c\\\/span\x3e\x3cspan class\x3d\\\x22milestone-name\\\x22\x3eSeparate Dev \/ Stage \/ Prod Environments\x3c\\\/span\x3e\x3cdiv class\x3d\\\x22milestone-progress-mini\\\x22\x3e\x3cdiv class\x3d\\\x22milestone-progress-fill\\\x22\x3e\x3c\\\/div\x3e\x3c\\\/div\x3e\x3csvg class\x3d\\\x22milestone-chevron\\\x22 view ss\x3d\\\x22channel-card-body\\\x22\x3e\\n        \x3cp\x3eIntegrates Genie with Microsoft Teams via Copilot Studio as the bridge. The Azure Databricks Power Platform connector exposes Genie Spaces to Copilot Studio as an MCP tool, and Copilot orchestrates when to call Genie during a Teams conversation.\x3c\\\/p\x3e\\n        \x3cdiv class\x3d\\\x22channel-steps\\\x22\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e1\x3c\\\/div\x3e\x3cdiv\x3eSet up the Azure Databricks connector in Power Platform with OAuth (per-user identity)\x3c\\\/div\x3e\x3c\\\/div\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e2\x3c\\\/div\x3e\x3cdiv\x3eConfigure a Copilot Studio agent to use the target Genie Space as an MCP tool\x3c\\\/div\x3e\x3c\\\/div\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e3\x3c\\\/div\x3e\x3cdiv\x3ePublish the Copilot agent to the Microsoft Teams channel\x3c\\\/div\x3e\x3c\\\/div\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e4\x3c\\\/div\x3e\x3cdiv\x3eEnd users ask questions in Teams and receive Genie-backed, UC-governed analytics responses\x3c\\\/div\x3e\x3c\\\/div\x3e\\n        \x3c\\\/div\x3e\\n        \x3cp style\x3d\\\x22margin-top:10px;font-size:12px;color:var(--text-light);\\\x22\x3eData access respects Unity Catalog privileges per user. No custom code required.\x3c\\\/p\x3e\\n      \x3c\\\/div\x3e\\n    \x3c\\\/div\x3e\\n    \x3cdiv class\x3d\\\x22channel-card\\\x22\x3e\\n      \x3cdiv class\x3d\\\x22channel-card-header\\\x22\x3e\x3cdiv class\x3d\\\x22channel-icon path-b\\\x22 style\x3d\\\x22font-size:13px;font-weight:700;color:var(--red);\\\x22\x3eB\x3c\\\/div\x3e\x3cdiv\x3e\x3cdiv class\x3d\\\x22channel-card-title\\\x22\x3ePath B \\u2014 Azure Native (Custom Bot)\x3c\\\/div\x3e\x3cdiv class\x3d\\\x22channel-card-subtitle\\\x22\x3ePro-code, full control. More flexible, more effort.\x3c\\\/div\x3e\x3c\\\/div\x3e\x3c\\\/div\x3e\\n      \x3cdiv class\x3d\\\x22channel-badges\\\x22\x3e\x3cspan class\x3d\\\x22channel-badge\\\x22\x3eTeams\x3c\\\/span\x3e\x3cspan class\x3d\\\x22channel-badge\\\x22\x3eSlack\x3c\\\/span\x3e\x3cspan class\x3d\\\x22channel-badge\\\x22\x3ePower BI\x3c\\\/span\x3e\x3cspan class\x3d\\\x22channel-badge\\\x22\x3eAzure Bot\x3c\\\/span\x3e\x3cspan class\x3d\\\x22channel-badge\\\x22\x3ePython \/ AioHTTP\x3c\\\/span\x3e\x3c\\\/div\x3e\\n      \x3cdiv class\x3d\\\x22channel-card-body\\\x22\x3e\\n        \x3cp\x3eBuilds a custom Teams bot calling the Genie Conversation API directly. Provision Azure resources (resource group, App Service plan, Web App, Azure Bot) and wire the bot\x27s messaging endpoint to a Python\/AioHTTP app.\x3c\\\/p\x3e\\n        \x3cdiv class\x3d\\\x22channel-steps\\\x22\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e1\x3c\\\/div\x3e\x3cdiv\x3eProvision Azure resources: resource group, App Service plan, Web App, and Azure Bot\x3c\\\/div\x3e\x3c\\\/div\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e2\x3c\\\/div\x3e\x3cdiv\x3eDeploy Python\/AioHTTP app that handles Teams messages and calls Genie Conversation API\x3c\\\/div\x3e\x3c\\\/div\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e3\x3c\\\/div\x3e\x3cdiv\x3eConfigure env vars: Databricks host, Genie Space ID, bot App ID\/secret, starter questions\x3c\\\/div\x3e\x3c\\\/div\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e4\x3c\\\/div\x3e\x3cdiv\x3eAdd session management, user self-identification, and feedback commands\x3c\\\/div\x3e\x3c\\\/div\x3e\\n          \x3cdiv class\x3d\\\x22channel-step\\\x22\x3e\x3cdiv class\x3d\\\x22channel-step-num\\\x22\x3e5\x3c\\\/div\x3e\x3cdiv\x3eWire the bot\x27s messaging endpoint to the Web App and test end-to-end\x3c\\\/div\x3e\x3c\\\/div\x3e\\n        \x3c\\\/div\x3e\\n        \x3cp style\x3d\\\x22margin-top:10px;font-size:12px;color:var(--text-light);\\\x22\x3eSupports PAT and OAuth auth. Requires Azure engineering resource to maintain.\x3c\\\/p\x3e\\n      \x3c\\\/div\x3e\\n    \x3c\\\/div\x3e\\n  \x3c\\\/div\x3e\\n  \x3cdiv class\x3d\\\x22compare-box\\\x22\x3e\\n    \x3cdiv style\x3d\\\x22font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--navy);margin-bottom:10px;\\\x22\x3eChoosing Your Path\x3c\\\/div\x3e\\n    \x3cdiv class\x3d\\\x22compare-grid\\\x22\x3e\\n      \x3cdiv\x3e\x3cdiv class\x3d\\\x22compare-label\\\x22\x3eChoose Path A if...\x3c\\\/div\x3e\x3cdiv style\x3d\\\x22font-size:13px;color:var(--text-muted);line-height:1.65;\\\x22\x3eSuncorp already uses Microsoft 365 \/ Copilot Studio. You want to go live with Teams quickly with minimal custom code. Per-user OAuth governance is required.\x3c\\\/div\x3e\x3c\\\/div\x3e\\n      \x3cdiv\x3e\x3cdiv class\x3d\\\x22compare-label\\\x22\x3eChoose Path B if...\x3c\\\/div\x3e\x3cdiv style\x3d\\\x22font-size:13px;color:var(--text-muted);line-height:1.65;\\\x22\x3eYou need custom UX, session management, or bot logic beyond Copilot Studio. Engineering resources are available and you want full control over the integration.\x3c\\\/div\x3e\x3c\\\/div\x3e\\n    \x3c\\\/div\x3e\\n  \x3c\\\/div\x3e\\n\x3c\\\/div\x3e\\n\\n\x3c\\\/main\x3e\\n\\n\x3cscript\x3e\\n  const STATE_KEY \x3d \x27genie-playbook-suncorp-v2\x27;\\n  let checked \x3d \x7b\x7d;\\n  try \x7b checked \x3d JSON.parse(localStorage.getItem(STATE_KEY) || \x27\x7b\x7d\x27); \x7d catch(e) \x7b checked \x3d \x7b\x7d; \x7d\\n\\n  function switchTab(idx) \x7b\\n    document.querySelectorAll(\x27.phase-panel\x27).forEach((p,i) \x3d\x3e p.classList.toggle(\x27active\x27, i\x3d\x3d\x3didx));\\n    document.querySelectorAll(\x27.tab-btn\x27).forEach((b,i) \x3d\x3e b.classList.toggle(\x27active\x27, i\x3d\x3d\x3didx));\\n    updateAllProgress();\\n  \x7d\\n\\n  function toggleMilestone(header) \x7b\\n    const body \x3d header.nextElementSibling;\\n    header.classList.toggle(\x27open\x27);\\n    body.classList.toggle(\x27open\x27);\\n  \x7d\\n\\n  function toggleTask(item) \x7b\\n    item.classList.toggle(\x27checked\x27);\\n    const key \x3d getTaskKey(item);\\n    checked\x5bkey\x5d \x3d item.classList.contains(\x27checked\x27);\\n    saveState();\\n    updateMilestoneProgress(item.closest(\x27.milestone-group\x27));\\n    const phaseIdx \x3d parseInt(item.closest(\x27\x5bdata-phase\x5d\x27).dataset.phase);\\n    updatePhaseProgress(phaseIdx);\\n    updateOverall();\\n  \x7d\\n\\n  function getTaskKey(item) \x7b\\n    const txt \x3d item.querySelector(\x27.task-text\x27).childNodes\x5b0\x5d.nodeValue?.trim() || \x27\x27;\\n    const phase \x3d item.closest(\x27\x5bdata-phase\x5d\x27)?.dataset.phase || \x270\x27;\\n    return `p$\x7bphase\x7d::$\x7btxt.substring(0,50)\x7d`;\\n  \x7d\\n\\n  function updateMilestoneProgress(group) \x7b\\n    if (!group) return;\\n    const total \x3d group.querySelectorAll(\x27.task-item\x27).length;\\n    const done \x3d group.querySelectorAll(\x27.task-item.checked\x27).length;\\n    const pct \x3d total ? (done \/ total) * 100 : 0;\\n    const fill \x3d group.querySelector(\x27.milestone-progress-fill\x27);\\n    if (fill) fill.style.width \x3d pct + \x27%\x27;\\n  \x7d\\n\\n  function updatePhaseProgress(phaseIdx) \x7b\\n    const groups \x3d document.querySelectorAll(`\x5bdata-phase\x3d\\\x22$\x7bphaseIdx\x7d\\\x22\x5d`);\\n    let total \x3d 0, done \x3d 0;\\n    groups.forEach(g \x3d\x3e \x7b\\n      total +\x3d g.querySelectorAll(\x27.task-item\x27).length;\\n      done +\x3d g.querySelectorAll(\x27.task-item.checked\x27).length;\\n    \x7d);\\n    const pct \x3d total ? Math.round((done \/ total) * 100) : 0;\\n    \\n    \\n    const panelIdx \x3d phaseIdx;\\n    const ring \x3d document.getElementById(\x27ring-\x27 + panelIdx);\\n    if (ring) ring.style.strokeDashoffset \x3d 188.5 - (pct \/ 100) * 188.5;\\n    const rp \x3d document.getElementById(\x27ringpct-\x27 + panelIdx);\\n    if (rp) rp.textContent \x3d pct + \x27%\x27;\\n    const tc \x3d document.getElementById(\x27taskcount-\x27 + panelIdx);\\n    if (tc) tc.textContent \x3d done + \x27 \/ \x27 + total + \x27 tasks\x27;\\n    const badge \x3d document.getElementById(\x27badge-\x27 + panelIdx);\\n    if (badge \x26\x26 panelIdx \x3c 7) badge.textContent \x3d pct + \x27%\x27;\\n  \x7d\\n\\n  function updateOverall() \x7b\\n    const all \x3d document.querySelectorAll(\x27\x5bdata-phase\x5d .task-item\x27);\\n    const done \x3d document.querySelectorAll(\x27\x5bdata-phase\x5d .task-item.checked\x27).length;\\n    const pct \x3d all.length ? Math.round((done \/ all.length) * 100) : 0;\\n    document.getElementById(\x27overallFill\x27).style.width \x3d pct + \x27%\x27;\\n    document.getElementById(\x27overallPct\x27).textContent \x3d pct + \x27%\x27;\\n  \x7d\\n\\n  function updateAllProgress() \x7b\\n    document.querySelectorAll(\x27.milestone-group\x27).forEach(g \x3d\x3e updateMilestoneProgress(g));\\n    \x5b0,1,2,3,4,5,6\x5d.forEach(i \x3d\x3e updatePhaseProgress(i));\\n    updateOverall();\\n  \x7d\\n\\n  function resetPhase(phaseIdx) \x7b\\n    document.querySelectorAll(`\x5bdata-phase\x3d\\\x22$\x7bphaseIdx\x7d\\\x22\x5d .task-item.checked`).forEach(item \x3d\x3e \x7b\\n      item.classList.remove(\x27checked\x27);\\n      delete checked\x5bgetTaskKey(item)\x5d;\\n    \x7d);\\n    saveState();\\n    updatePhaseProgress(phaseIdx);\\n    updateOverall();\\n  \x7d\\n\\n  function saveState() \x7b\\n    try \x7b localStorage.setItem(STATE_KEY, JSON.stringify(checked)); \x7d catch(e) \x7b\x7d\\n  \x7d\\n\\n  function restoreState() \x7b\\n    document.querySelectorAll(\x27.task-item\x27).forEach(item \x3d\x3e \x7b\\n      if (checked\x5bgetTaskKey(item)\x5d) item.classList.add(\x27checked\x27);\\n    \x7d);\\n  \x7d\\n\\n  restoreState();\\n  updateAllProgress();\\n\x3c\\\/script\x3e\\n\x3c\\\/body\x3e\\n\x3c\\\/html\x3e\\n\x22,\x22ncc\x22:\x22\x7b\\\x22awhs\\\x22:true\x7d\x22\x7d", "AAA0AZESG0bK0KPg1sInqGtnn-oP:1777480950588", undefined, false , true  , "true", "https:\/\/n-cew67dho5gvyrco2bsnto6k2n4gefv32iwjakjy-0lu-script.googleusercontent.com", "https:\/\/drive.google.com\/abuse?id\x3dAKkXjoxc_UqTh5UX7mtgReEFdqse1EpsnbQedLDcYkqB6q0n0G-3TA0QkSkp2vnxDy3QENVQ-xo3d_tiaA07Uw3blITURe3qiBGUENLX%3A0\x26docurl\x3dhttps%3A%2F%2Fscript.google.com%2Fa%2Fmacros%2Fdatabricks.com%2Fs%2FAKfycbyiMJwYYhiVGKmgIi2nGN_pos6CcfQhiN-dQgbqEswyKucViHtJLweFuG_mLmvMcJ0yAA%2Fexec%3Fpli%3D1");}
